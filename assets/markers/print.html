<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>ARマーカー印刷ページ｜種まき支援AR</title>
  <style>
    /* 画面プレビュー時の見栄え */
    body {
      font-family: system-ui, "Yu Gothic UI", "Meiryo", sans-serif;
      max-width: 720px;
      margin: 24px auto;
      padding: 0 16px;
      color: #222;
      line-height: 1.7;
    }
    h1 { color: #1B5E20; }
    .marker-frame {
      display: inline-block;
      padding: 5mm;
      border: 2px dashed #ccc;
      margin: 24px 0;
    }
    .marker-frame img {
      width: 50mm;
      height: 50mm;
      display: block;
    }
    .ruler {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #555;
      margin-top: 4px;
    }
    .ruler::before {
      content: "";
      display: inline-block;
      width: 50mm;
      height: 1px;
      background: #555;
      position: relative;
    }
    .note {
      background: #FFF8E1;
      border-left: 4px solid #FFB300;
      padding: 12px 16px;
      margin: 16px 0;
      border-radius: 4px;
    }

    /* 印刷時：マーカーを正確に 50mm × 50mm で出力 */
    @media print {
      body { margin: 0; padding: 0; max-width: none; }
      .no-print { display: none !important; }
      .marker-frame { border: none; padding: 0; margin: 20mm; }
      .marker-frame img { width: 50mm; height: 50mm; }
      @page { size: A4 portrait; margin: 0; }
    }
  </style>
</head>
<body>

<div class="no-print">
  <h1>ARマーカー印刷ページ</h1>
  <p>このページを A4 用紙に <strong>等倍（100%）で印刷</strong> すると、Hiroマーカーが <strong>50mm × 50mm（5cm四方）</strong>で印刷されます。</p>

  <div class="note">
    <strong>印刷時の注意：</strong><br>
    印刷ダイアログで「ページサイズに合わせて拡大／縮小」を <strong>オフ</strong>（または「実際のサイズ」「100%」）にしてください。
    そうしないとマーカーが拡大・縮小され、AR表示が正しい寸法になりません。
  </div>

  <p>印刷後、マーカーをハサミで切り取り、プランター長辺の手前中央（土の表面）に、マーカーの上辺がプランター長辺と平行になるように貼り付けてください。</p>

  <hr>
  <p style="color: #888; font-size: 14px;">↓ ここから下が印刷される領域です（プレビュー）</p>
</div>

<div class="marker-frame">
  <img src="hiro.png" alt="Hiro AR marker">
  <div class="ruler no-print">← 50mm（5cm）</div>
</div>

<div class="no-print">
  <button onclick="window.print()" style="font-size: 18px; padding: 12px 32px; background: #43A047; color: white; border: none; border-radius: 8px; cursor: pointer;">
    印刷する
  </button>
</div>

</body>
</html>
