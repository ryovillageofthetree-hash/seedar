<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>AR表示｜種まき支援AR</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe-master.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
</head>
<body class="ar-body">

<div id="status" class="ar-status">マーカーをうつしてください</div>
<div id="info" class="ar-info"></div>
<a id="back" class="btn-back ar-back" href="method.html">もどる</a>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; trackingMethod: best;"
  renderer="logarithmicDepthBuffer: true; precision: medium; alpha: true;">

  <a-marker preset="hiro" id="ar-marker" smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">
    <a-entity id="seed-container"></a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script src="js/calculator.js"></script>
<script src="js/ar-renderer.js"></script>
</body>
</html>
