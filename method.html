<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>種まきの方法をえらぶ｜種まき支援AR</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/main.js" defer></script>
</head>
<body>
<main>
  <h1 class="heading">種まきの方法をえらぼう</h1>

  <div class="choice-grid">
    <a class="choice-btn" id="row-btn" href="ar.html" aria-label="すじまき：一直線にまく">
      <svg viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="6" y="12" width="88" height="40" rx="3" fill="#8D6E63" stroke="#5D4037" stroke-width="1.2"/>
        <ellipse cx="50" cy="12" rx="44" ry="4" fill="#A1887F" stroke="#5D4037" stroke-width="1.2"/>
        <ellipse cx="50" cy="12" rx="44" ry="4" fill="#6D4C41" opacity="0.6"/>
        <g fill="#2E7D32">
          <circle cx="14" cy="26" r="1.6"/><circle cx="22" cy="26" r="1.6"/>
          <circle cx="30" cy="26" r="1.6"/><circle cx="38" cy="26" r="1.6"/>
          <circle cx="46" cy="26" r="1.6"/><circle cx="54" cy="26" r="1.6"/>
          <circle cx="62" cy="26" r="1.6"/><circle cx="70" cy="26" r="1.6"/>
          <circle cx="78" cy="26" r="1.6"/><circle cx="86" cy="26" r="1.6"/>
        </g>
        <g fill="#2E7D32">
          <circle cx="14" cy="42" r="1.6"/><circle cx="22" cy="42" r="1.6"/>
          <circle cx="30" cy="42" r="1.6"/><circle cx="38" cy="42" r="1.6"/>
          <circle cx="46" cy="42" r="1.6"/><circle cx="54" cy="42" r="1.6"/>
          <circle cx="62" cy="42" r="1.6"/><circle cx="70" cy="42" r="1.6"/>
          <circle cx="78" cy="42" r="1.6"/><circle cx="86" cy="42" r="1.6"/>
        </g>
      </svg>
      <span class="label">すじまき</span>
      <span class="sub">一直線にまく</span>
    </a>

    <a class="choice-btn" id="point-btn" href="ar.html" aria-label="点まき：等間隔にまく">
      <svg viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="6" y="12" width="88" height="40" rx="3" fill="#8D6E63" stroke="#5D4037" stroke-width="1.2"/>
        <ellipse cx="50" cy="12" rx="44" ry="4" fill="#A1887F" stroke="#5D4037" stroke-width="1.2"/>
        <ellipse cx="50" cy="12" rx="44" ry="4" fill="#6D4C41" opacity="0.6"/>
        <g fill="#1565C0">
          <!-- 上段 4 穴（各3粒の三角形配置） -->
          <circle cx="20" cy="22" r="1"/><circle cx="18.5" cy="24.5" r="1"/><circle cx="21.5" cy="24.5" r="1"/>
          <circle cx="40" cy="22" r="1"/><circle cx="38.5" cy="24.5" r="1"/><circle cx="41.5" cy="24.5" r="1"/>
          <circle cx="60" cy="22" r="1"/><circle cx="58.5" cy="24.5" r="1"/><circle cx="61.5" cy="24.5" r="1"/>
          <circle cx="80" cy="22" r="1"/><circle cx="78.5" cy="24.5" r="1"/><circle cx="81.5" cy="24.5" r="1"/>
          <!-- 下段 4 穴 -->
          <circle cx="20" cy="40" r="1"/><circle cx="18.5" cy="42.5" r="1"/><circle cx="21.5" cy="42.5" r="1"/>
          <circle cx="40" cy="40" r="1"/><circle cx="38.5" cy="42.5" r="1"/><circle cx="41.5" cy="42.5" r="1"/>
          <circle cx="60" cy="40" r="1"/><circle cx="58.5" cy="42.5" r="1"/><circle cx="61.5" cy="42.5" r="1"/>
          <circle cx="80" cy="40" r="1"/><circle cx="78.5" cy="42.5" r="1"/><circle cx="81.5" cy="42.5" r="1"/>
        </g>
      </svg>
      <span class="label">点まき</span>
      <span class="sub"><ruby>等間隔<rt>とうかんかく</rt></ruby>にまく</span>
    </a>
  </div>

  <a class="btn-back" href="planter.html">もどる</a>
</main>
</body>
</html>
